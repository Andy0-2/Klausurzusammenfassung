<style>
  :root{--bg:#0b1f2e;--card:#ffffff;--accent:#11598a;--accent2:#0b3d5c;--mut:#6b8497;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,'Segoe UI',sans-serif;}
  body{background:linear-gradient(160deg,#0b1f2e,#143a52);min-height:100vh;color:#eaf2f8;
       display:flex;flex-direction:column;align-items:center;padding:18px;}

  .sub{color:#9cc0d8;font-size:.85rem;margin-bottom:14px;text-align:center;}
  .bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;
       margin-bottom:14px;max-width:760px;}
  select,button{font-size:.9rem;padding:8px 12px;border-radius:8px;border:none;cursor:pointer;}
  select{background:#1d4a66;color:#fff;}
  button{background:var(--accent);color:#fff;font-weight:600;transition:.15s;}
  button:hover{background:#1a73af;} button:active{transform:scale(.96);}

  .scene{width:min(92vw,640px);height:360px;perspective:1400px;margin-bottom:6px;}
  .card{position:relative;width:100%;height:100%;transform-style:preserve-3d;
        transition:transform .5s;cursor:pointer;}
  .card.flip{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;
        padding:28px;display:flex;flex-direction:column;justify-content:center;
        box-shadow:0 14px 40px rgba(0,0,0,.45);}
  .front{background:linear-gradient(155deg,#ffffff,#eef6fb);color:#0b3d5c;}
  .back{background:linear-gradient(155deg,#0b3d5c,#11598a);color:#fff;transform:rotateY(180deg);}
  .tag{position:absolute;top:14px;left:16px;font-size:.7rem;letter-spacing:.5px;
       text-transform:uppercase;font-weight:700;opacity:.7;}
  .hint{position:absolute;bottom:12px;right:16px;font-size:.7rem;opacity:.55;}
  .qtext{font-size:1.25rem;font-weight:700;line-height:1.35;}
  .atext{font-size:1.08rem;line-height:1.45;}
  .nav{display:flex;gap:10px;margin-top:10px;}
  .progress{width:min(92vw,640px);height:6px;background:#1d4a66;border-radius:6px;
            overflow:hidden;margin-top:10px;}
  .fill{height:100%;background:linear-gradient(90deg,#3aa0e0,#7fd0ff);width:0;}
  .done{color:#7fd0ff;font-weight:700;margin-top:10px;text-align:center;}
  kbd{background:#1d4a66;border-radius:4px;padding:1px 6px;font-size:.75rem;}
</style></head><body>
  <h1>🃏 Karteikarten · Wirtschaftspsychologie</h1>
  <div class="sub">Klick auf die Karte zum Umdrehen · <kbd>Leertaste</kbd> drehen · <kbd>→</kbd> weiter · <kbd>←</kbd> zurück</div>

<script>
const ALL = [{"q": "Was ist der Gegenstand der Psychologie?", "a": "Erleben, Verhalten und Bewusstsein des Menschen sowie deren innere (im Individuum) und äußere (in der Umwelt) Bedingungen.", "c": "1 Einführung"}, {"q": "Definiere Wirtschaftspsychologie.", "a": "Empirische Wissenschaft vom Erleben und Verhalten der Menschen im wirtschaftlichen Kontext (Kunden, Mitarbeitende, Marktteilnehmende).", "c": "1 Einführung"}, {"q": "Wofür steht Wilhelm Wundt?", "a": "Gründete 1879 das erste experimentalpsychologische Labor (Leipzig); Voluntarismus (Wille = Wahl der Aufmerksamkeit).", "c": "1 Einführung"}, {"q": "Wofür steht Hugo Münsterberg?", "a": "Psychologie als praktische Wissenschaft; entwickelte ersten Berufseignungstest (Straßenbahnfahrer).", "c": "1 Einführung"}, {"q": "Verfügbarkeitsheuristik?", "a": "Leicht abrufbare/vorstellbare Informationen werden als häufiger/wichtiger eingeschätzt. Bsp.: 'k' am Wortanfang wirkt häufiger, kommt aber 3× öfter an 3. Stelle vor.", "c": "1 Einführung"}, {"q": "Repräsentativitätsheuristik?", "a": "Je typischer ein Objekt für eine Kategorie, desto höher die geschätzte Zugehörigkeit. Bsp.: Lottozahlen 9-12-17-23-34-45 wirken 'zufälliger' als 1-2-3-4-5-6.", "c": "1 Einführung"}, {"q": "Ankereffekt (Anchoring)?", "a": "Vorhandene Information (Anker) führt zur Untergewichtung neuer Information. Bsp.: 1×2×…×8 wird höher geschätzt (2250) als 8×7×…×1 (512).", "c": "1 Einführung"}, {"q": "Selektive Wahrnehmung?", "a": "Aus vielen Informationen werden nur die herangezogen, die zur eigenen Meinung/Vorstellung passen.", "c": "1 Einführung"}, {"q": "Die 4 Ziele der Psychologie? (Eselsbrücke BEVV)", "a": "Beschreibung, Erklärung, Vorhersage, Veränderung.", "c": "2 Grundverständnis"}, {"q": "4 Probleme der Alltagspsychologie?", "a": "Overconfidence (Selbstsicherheit), Social Perception (sehen, was wir erwarten), Hindsight Bias (Rückschaufehler), Vorurteile.", "c": "2 Grundverständnis"}, {"q": "Confirmation Bias?", "a": "Aktive Suche nach bestätigender Information + Vernachlässigung widerlegender Information und von Nicht-Ereignissen.", "c": "2 Grundverständnis"}, {"q": "Self-fulfilling prophecy?", "a": "Eine falsche Annahme beeinflusst das eigene Verhalten, das das Ergebnis mit auslöst – die Annahme bestätigt sich scheinbar.", "c": "2 Grundverständnis"}, {"q": "Merkmale guter wissenschaftlicher Hypothesen?", "a": "Empirisch untersuchbar, Allsätze (nicht Existenzsätze), wenn-dann/je-desto, eindeutige Vorhersage, falsifizierbar (widerlegbar).", "c": "2 Grundverständnis"}, {"q": "Verifikation vs. Falsifikation bei Allaussagen?", "a": "Allaussagen sind durch endliche Beobachtungen nie verifizierbar, aber durch eine einzige Beobachtung falsifizierbar. Statt 'Wahrheit' → 'Bewährung'.", "c": "2 Grundverständnis"}, {"q": "Operationalisierung?", "a": "Konkretisierung theoretischer Begriffe/Hypothesen durch Angabe beobachtbarer und messbarer Ereignisse.", "c": "2 Grundverständnis"}, {"q": "Manifeste vs. latente Variable?", "a": "Manifest = tatsächlich messbarer Sachverhalt (z. B. Fahrverhalten). Latent = nicht direkt beobachtbares Konstrukt (z. B. Fahrtüchtigkeit) → Operationalisierung nötig.", "c": "2 Grundverständnis"}, {"q": "UV, AV, SV im Experiment?", "a": "UV = unabhängige Variable (aktiv manipuliert). AV = abhängige Variable (gemessen). SV = Störvariable (beeinflusst AV ebenfalls).", "c": "2 Grundverständnis"}, {"q": "Was bedeutet Randomisierung?", "a": "Zufällige Zuweisung zu Versuchsbedingungen; verteilt bekannte und unbekannte Störvariablen gleichmäßig auf die Gruppen.", "c": "2 Grundverständnis"}, {"q": "3 Bedingungen für Kausalität im Experiment?", "a": "(1) Veränderung der AV, (2) UV ist der AV zeitlich vorgeordnet, (3) keine Störvariable beeinflusst den Zusammenhang.", "c": "2 Grundverständnis"}, {"q": "Labor- vs. Feldexperiment?", "a": "Labor: kontrolliert, Kausalaussagen – aber künstlich (Demand Characteristics). Feld: natürliche Umwelt, externe Validität – aber Kausalschluss problematisch.", "c": "2 Grundverständnis"}, {"q": "Demand Characteristics?", "a": "Teilnehmer verhalten sich (unbewusst) so, wie sie die Hypothese/Erwartung des Versuchs vermuten.", "c": "2 Grundverständnis"}, {"q": "Die 3 Hauptgütekriterien?", "a": "Objektivität (unabhängig vom Untersucher), Reliabilität (Messgenauigkeit), Validität (misst, was es soll).", "c": "2 Grundverständnis"}, {"q": "3 Arten der Objektivität?", "a": "Durchführungs-, Auswertungs- und Interpretationsobjektivität.", "c": "2 Grundverständnis"}, {"q": "3 Arten der Reliabilität?", "a": "Retest- (Stabilität), Paralleltest- (Äquivalenz), interne Konsistenz (Homogenität).", "c": "2 Grundverständnis"}, {"q": "3 Arten der Validität?", "a": "Inhalts-, Kriteriums- und Konstruktvalidität.", "c": "2 Grundverständnis"}, {"q": "Zusammenhang Reliabilität ↔ Validität?", "a": "Reliabilität ist Voraussetzung für Validität. Ein Test kann reliabel ohne valide sein, aber nicht valide ohne reliabel.", "c": "2 Grundverständnis"}, {"q": "Absolute Reizschwelle?", "a": "Minimale Reizgröße (S₀), die eben noch wahrgenommen wird.", "c": "3.1 Wahrnehmung"}, {"q": "Unterschiedsschwelle (jnd)?", "a": "Kleinster eben noch wahrnehmbarer Unterschied (ΔS) zwischen zwei Reizgrößen (just noticeable difference).", "c": "3.1 Wahrnehmung"}, {"q": "Webersches Gesetz + Aussage?", "a": "ΔR/R = k. Ein Reiz muss um einen bestimmten Prozentsatz (nicht Betrag) verändert werden, damit der Unterschied wahrnehmbar wird.", "c": "3.1 Wahrnehmung"}, {"q": "Anwendung Webersches Gesetz in der Werbung?", "a": "Produktverschlechterung unterhalb der Unterschiedsschwelle (unbemerkt), Produktverbesserung oberhalb (bemerkbar), Designänderung meist unterhalb.", "c": "3.1 Wahrnehmung"}, {"q": "Distaler vs. proximaler Reiz?", "a": "Distal = physikalisches Objekt in der Umwelt. Proximal = sensorische Aktivität am Sinnesorgan (z. B. retinales Abbild).", "c": "3.1 Wahrnehmung"}, {"q": "3 Stufen des Wahrnehmungsprozesses?", "a": "1. Empfinden (physikal. Energie → neuronale Info), 2. Organisieren (Perzept-Bildung), 3. Identifizieren & Einordnen (Bedeutung).", "c": "3.1 Wahrnehmung"}, {"q": "Bottom-up vs. Top-down?", "a": "Bottom-up = aufsteigend, datengesteuert (von Rezeptoren). Top-down = absteigend, konzeptgesteuert (durch Erfahrung/Erwartung).", "c": "3.1 Wahrnehmung"}, {"q": "Endogene vs. exogene Aufmerksamkeitslenkung?", "a": "Endogen = von innen, willentlich/kontrolliert. Exogen = von außen, reflexiv/automatisch durch saliente Reize.", "c": "3.1 Wahrnehmung"}, {"q": "Salienz?", "a": "Fähigkeit eines Reizes, Aufmerksamkeit auf sich zu ziehen (z. B. durch prägnante Gestaltung).", "c": "3.1 Wahrnehmung"}, {"q": "Stroop-Effekt?", "a": "Konflikt beim Benennen der Druckfarbe eines Farbworts (z. B. 'ROT' in blau); automatisiertes Wortlesen stört → längere Reaktionszeit.", "c": "3.1 Wahrnehmung"}, {"q": "Sakkaden vs. Fixationen?", "a": "Sakkaden = schnelle Augenbewegungen (100–200 ms Latenz). Fixationen = ruhige Phasen (250–300 ms), in denen die Verarbeitung erfolgt.", "c": "3.1 Wahrnehmung"}, {"q": "3 elementare Gedächtnisvorgänge?", "a": "Enkodieren (Repräsentation aufbauen), Speichern (behalten), Abrufen (rekonstruieren).", "c": "3.2 Gedächtnis"}, {"q": "Mehrspeichermodell – Kapazitäten/Dauer?", "a": "Sensorisch (0,5–4 s, hoch) → KZG (10–15 s, 7±2 Chunks) → LZG (Tage–Jahre, hoch).", "c": "3.2 Gedächtnis"}, {"q": "Deklaratives vs. prozedurales Wissen?", "a": "Deklarativ (was): Fakten – episodisch (Erlebnisse) vs. semantisch (Weltwissen). Prozedural (wie): Handlungsabläufe (Fahrradfahren).", "c": "3.2 Gedächtnis"}, {"q": "Ebbinghaus – Beitrag & Vergessenskurve?", "a": "Selbstversuch mit sinnlosen Silben; Nachweis: Gedächtnis ist experimentell untersuchbar. Vergessenskurve fällt zunächst stark, dann flacher ab.", "c": "3.2 Gedächtnis"}, {"q": "Atkinson & Shiffrin (1968)?", "a": "Maintenance Rehearsal (Häufigkeit/Dauer innerer Wiederholung) entscheidet über den Transfer ins LZG.", "c": "3.2 Gedächtnis"}, {"q": "Verarbeitungstiefe (Craik & Lockhart)?", "a": "Nicht Häufigkeit, sondern Verarbeitungstiefe entscheidet: semantisch tiefe Verarbeitung → besseres LZG (Levels of Processing).", "c": "3.2 Gedächtnis"}, {"q": "Enkodierspezifität?", "a": "Übereinstimmung von Enkodier- und Abrufbedingungen erleichtert den Abruf; gespeichert werden 'Items-in-Kontext' (Ereignisse).", "c": "3.2 Gedächtnis"}, {"q": "Free-, Cued-Recall, Recognition?", "a": "Free-Recall: ohne Hilfe reproduzieren. Cued-Recall: mit Gedächtnisstütze. Recognition: Wiedererkennen (meist beste Ergebnisse).", "c": "3.2 Gedächtnis"}, {"q": "Schema vs. Skript?", "a": "Schema = vernetzte Wissensstruktur mit Leerstellen (default values). Skript = Schema für häufige Ereignisse (Restaurantbesuch), zeitlich-sequenziell.", "c": "3.2 Gedächtnis"}, {"q": "Kontiguitäts- vs. Ähnlichkeitsgesetz (Assoziation)?", "a": "Kontiguität: je öfter zwei Reize zusammen auftreten, desto stärker die Verknüpfung. Ähnlichkeit: je ähnlicher zwei Inhalte, desto leichter erinnert.", "c": "3.2 Gedächtnis"}, {"q": "Definition Lernen?", "a": "Relativ überdauernde Veränderung der Verhaltensmöglichkeit aufgrund von Übung/Erfahrung (nicht durch Reifung, Ermüdung, Drogen).", "c": "3.3 Lernen"}, {"q": "Habituation?", "a": "Abnehmende Reaktionsbereitschaft bei wiederholter Reizdarbietung – nicht Ermüdung, nicht Sinnesabstumpfung (zentralnervös).", "c": "3.3 Lernen"}, {"q": "Sensibilisierung?", "a": "Nach intensiver/schmerzhafter Reizung verstärkt sich die Reaktion auf nachfolgende (auch schwache) Reize.", "c": "3.3 Lernen"}, {"q": "Klassische Konditionierung – US/UR/CS/CR?", "a": "US→UR = angeborener Reflex. CS (vorher neutral) löst nach Konditionierung CR aus. ISI = Abstand CS-Beginn ↔ US.", "c": "3.3 Lernen"}, {"q": "Klassische Konditionierung: neuere Sichtweise?", "a": "Signallernen: erworben wird eine Verbindung zweier Reize (CS ↔ US), nicht direkt Reiz→Reaktion (Kamin, 1969).", "c": "3.3 Lernen"}, {"q": "Bedingungen für Konditionierung in der Werbung?", "a": "Kontiguität (CS nah am US), CS vor US präsentieren, CS sollte neu sein; je öfter gemeinsam, desto stärker.", "c": "3.3 Lernen"}, {"q": "Thorndikes 3 Gesetze?", "a": "Gesetz des Effekts (Belohnung fördert), der Bereitschaft (Lernbereitschaft nötig), der Übung (Wiederholung).", "c": "3.3 Lernen"}, {"q": "Skinner – Verstärker/Strafe/Kontingenz?", "a": "Verstärker erhöht, Strafreiz verringert die Auftretenswahrscheinlichkeit. Kontingenz = Zusammenhang Verhalten ↔ Konsequenz.", "c": "3.3 Lernen"}, {"q": "Klassisch vs. operant – Kernunterschied?", "a": "Klassisch: Reiz löst Reaktion aus (Reiz VOR Verhalten). Operant: Konsequenz NACH dem Verhalten verändert dessen Häufigkeit.", "c": "3.3 Lernen"}, {"q": "Banduras 3 Lerneffekte?", "a": "Modellierender (neues Verhalten), enthemmender/hemmender (Hemmschwelle), auslösender (vorhandenes Verhalten ausgelöst).", "c": "3.3 Lernen"}, {"q": "Banduras 4 Prozesse des Modell-Lernens?", "a": "Aneignung: Aufmerksamkeit + Gedächtnis. Ausführung: motorische Reproduktion + Motivation/Verstärkung.", "c": "3.3 Lernen"}, {"q": "Motiv vs. Motivation?", "a": "Motiv = zeitlich stabile, dispositionelle Vorliebe für eine Anreizklasse. Motivation = entsteht aus Person × Situation; hypothetisches Konstrukt.", "c": "3.4 Motivation"}, {"q": "Triebtheorie (Freud) – Kerngedanke?", "a": "Defizit/Deprivation baut unspezifische Energie auf → Druck (push) → Verhalten = Spannungsreduktion. Psychologischer Determinismus.", "c": "3.4 Motivation"}, {"q": "Freuds 3 Instanzen?", "a": "Es (Lustprinzip, Triebe), Ich (Realitätsprinzip, vermittelt), Über-Ich (Gewissen, verinnerlichte Normen).", "c": "3.4 Motivation"}, {"q": "Eros vs. Thanatos?", "a": "Eros = Lebenstrieb (Libido, Lustgewinn). Thanatos = Todestrieb (Aggression, Rückkehr zum Anorganischen).", "c": "3.4 Motivation"}, {"q": "Lewins Feldtheorie – Grundformel?", "a": "V = f(P, U): Verhalten ist Funktion von Person und (psychologisch repräsentierter) Umwelt.", "c": "3.4 Motivation"}, {"q": "Valenz, Distanz, Kraft (Lewin)?", "a": "Valenz = Funktionalität/Aufforderungscharakter eines Objekts. Distanz = psychologische Entfernung. Kraft K = V/d.", "c": "3.4 Motivation"}, {"q": "Lewins 3 Konflikttypen?", "a": "Appetenz-Appetenz (2 attraktive), Aversions-Aversions (2 Übel), Appetenz-Aversions (1 Objekt zieht an & stößt ab).", "c": "3.4 Motivation"}, {"q": "SSR vs. LLR (Präferenzwechsel)?", "a": "SSR = smaller-sooner reward, LLR = larger-later reward. Bei großer Distanz LLR, bei kleiner Distanz SSR. v = V/(1+d).", "c": "3.4 Motivation"}, {"q": "Intrinsische vs. extrinsische Motivation?", "a": "Intrinsisch = tätigkeitszentriert (innerer Antrieb). Extrinsisch = zweckzentriert (äußere Belohnung).", "c": "3.4 Motivation"}, {"q": "5 Schritte der Kaufentscheidung?", "a": "1. Bedürfniswahrnehmung, 2. Informationssuche, 3. Evaluation von Alternativen, 4. Erwerb, 5. Verhalten nach dem Kauf.", "c": "4 Konsum & Werbung"}, {"q": "5 Rollen im Kaufentscheidungsprozess?", "a": "Initiator, Influencer, Decider, Buyer, User.", "c": "4 Konsum & Werbung"}, {"q": "Routine vs. Limited vs. Extensiv?", "a": "Routine: geringes Involvement, vertraut. Limited: unbekannte Marke, vertraute Kategorie. Extensiv: hoch, teuer, unbekannt → mögl. Dissonanz.", "c": "4 Konsum & Werbung"}, {"q": "Werbewirkung vs. Werbeerfolg?", "a": "Werbewirkung = vorökonomisch (kognitiv/affektiv/konativ). Werbeerfolg = ökonomisch (Umsatz, Gewinn, Marktanteil).", "c": "4 Konsum & Werbung"}, {"q": "AIDA-Modell?", "a": "Attention → Interest → Desire → Action.", "c": "4 Konsum & Werbung"}, {"q": "Involvement?", "a": "Grad der wahrgenommenen Wichtigkeit / des persönlichen Interesses (Ich-Beteiligung).", "c": "4 Konsum & Werbung"}, {"q": "ELM – zwei Routen?", "a": "Zentrale Route (hohes Involvement → Argumente, stabile Einstellung) vs. periphere Route (niedrig → Randmerkmale wie Attraktivität).", "c": "4 Konsum & Werbung"}, {"q": "Vampireffekt?", "a": "Ein starker Reiz (Erotik/Star/Gag) zieht alle Aufmerksamkeit ab → die Marke/Botschaft wird schlechter erinnert.", "c": "4 Konsum & Werbung"}, {"q": "Mere-Exposure-Effekt?", "a": "Wiederholte Darbietung macht Reize positiver/ansprechender (Personen, Bilder, Töne, Gerüche).", "c": "4 Konsum & Werbung"}, {"q": "Truth-Effekt?", "a": "Wiederholt geäußerte Werbeargumente werden als glaubwürdiger wahrgenommen.", "c": "4 Konsum & Werbung"}, {"q": "Irradiation?", "a": "Veränderte Wahrnehmung eines objektiv gleichen Reizes durch ein verändertes Reizumfeld.", "c": "4 Konsum & Werbung"}, {"q": "Befund zu subliminaler Werbung?", "a": "Existiert, wirkt aber nur schwach: aktiviert höchstens Grundbedürfnisse (Karremans: nur bei Durstigen), kurzfristig, vermeidbar, in EU unzulässig.", "c": "4 Konsum & Werbung"}, {"q": "Grundnutzen vs. Zusatznutzen?", "a": "Grundnutzen = technisch-funktionaler Gebrauchswert. Zusatznutzen (added value) = psychologische Aspekte (Status, Erlebnis).", "c": "4 Konsum & Werbung"}, {"q": "Haire-Einkaufslistenverfahren?", "a": "Zwei identische Listen außer einem Produkt; Charakterisierung des 'Schreibers' offenbart das Markenimage (Nescafé-Käuferin wirkte faul).", "c": "4 Konsum & Werbung"}, {"q": "4 Kriterien der Arbeitsgestaltung (Hacker & Richter)?", "a": "Ausführbarkeit, Schädigungslosigkeit, Beeinträchtigungsfreiheit, Persönlichkeitsförderlichkeit.", "c": "5 Arbeitspsychologie"}, {"q": "Inhalts- vs. Prozesstheorien der Motivation?", "a": "Inhaltstheorien: WAS motiviert (Maslow, Herzberg, Hackman&Oldham). Prozesstheorien: WIE entsteht/lenkt Verhalten (Vroom, Locke&Latham).", "c": "5 Arbeitspsychologie"}, {"q": "Maslows Bedürfnishierarchie?", "a": "Physiologisch → Sicherheit → Soziales → Wertschätzung → Selbstverwirklichung. Defizit- vs. Wachstumsmotive; rein in der Person verortet.", "c": "5 Arbeitspsychologie"}, {"q": "Herzberg Zwei-Faktoren-Theorie?", "a": "Hygienefaktoren (Kontext) verhindern Unzufriedenheit; Motivatoren (Inhalt: Leistung, Anerkennung) erzeugen Zufriedenheit.", "c": "5 Arbeitspsychologie"}, {"q": "Job-Characteristics Model – 5 Merkmale?", "a": "Anforderungsvielfalt, Ganzheitlichkeit, Bedeutsamkeit, Autonomie, Rückmeldung (Hackman & Oldham).", "c": "5 Arbeitspsychologie"}, {"q": "VIE-Theorie (Vroom) – 3 Komponenten?", "a": "Valenz (Wertigkeit des Ergebnisses), Instrumentalität (Ergebnis→Folge), Erwartung (Handlung→Ergebnis).", "c": "5 Arbeitspsychologie"}, {"q": "Erwartung vs. Instrumentalität (VIE)?", "a": "Erwartung = Handlung→Ergebnis (hängt an Person/Fähigkeit). Instrumentalität = Ergebnis→Folge (hängt an Organisation/Vorgesetzten).", "c": "5 Arbeitspsychologie"}, {"q": "Zielsetzungstheorie (Locke & Latham)?", "a": "Spezifische, herausfordernde Ziele + Feedback → bessere Leistung. Moderatoren: Zielbindung, Komplexität, Partizipation, Selbstwirksamkeit.", "c": "5 Arbeitspsychologie"}, {"q": "Trefferquoten-Regel der Personalauswahl?", "a": "Trefferquote ↑ bei hoher Validität, kleiner Selektionsquote und hoher Basisrate.", "c": "6 Personalpsychologie"}, {"q": "Basisrate vs. Selektionsrate?", "a": "Basisrate = geeignete/alle Bewerber. Selektionsrate = zu besetzende Stellen/Bewerberanzahl.", "c": "6 Personalpsychologie"}, {"q": "Trimodaler Ansatz der Personalauswahl?", "a": "Eigenschafts-/Konstruktansatz (Tests), Simulationsansatz (Arbeitsproben/AC), Biografischer Ansatz (Unterlagen/Interview).", "c": "6 Personalpsychologie"}, {"q": "Kriteriums- vs. Konstruktvalidierung?", "a": "Kriterium: statistischer Zusammenhang mit vorherzusagendem Kriterium. Konstrukt: Schluss auf theoretisches Konstrukt über andere Verfahren.", "c": "6 Personalpsychologie"}, {"q": "Assessment Center – Multi-Prinzip?", "a": "Mehrere Teilnehmer, mehrere Beobachter, mehrere Verfahren, mehrere Anforderungen.", "c": "6 Personalpsychologie"}, {"q": "Leistungstest vs. Fragebogen (Verfälschbarkeit)?", "a": "Leistungstest (maximales Verhalten): nicht verfälschbar. Fragebogen (Selbstauskunft, typisches Verhalten): verfälschbar.", "c": "6 Personalpsychologie"}, {"q": "6 Beurteilungsfehler der Personalbeurteilung?", "a": "Milde/Strenge, Kontrast/Assimilation, Tendenz zur Mitte, Halo, Primacy/Recency, Ähnlichkeit.", "c": "6 Personalpsychologie"}, {"q": "Halo-Effekt?", "a": "Gesamteindruck oder ein Einzelurteil färbt auf die Urteile zu anderen Leistungen ab.", "c": "6 Personalpsychologie"}, {"q": "Fluide vs. kristalline Intelligenz (Cattell)?", "a": "Fluid (gf): angeboren, lernunabhängig, nimmt mit Alter ab. Kristallin (gc): kumuliertes Wissen/Erfahrung, steigt monoton.", "c": "6 Personalpsychologie"}, {"q": "Prädiktive Validität – bestes Verfahren?", "a": "GMA/Intelligenztests sind beste Einzelprädiktoren (steigend mit Tätigkeitskomplexität); strukturierte Interviews hoch; Graphologie ~wertlos.", "c": "6 Personalpsychologie"}, {"q": "Scientist-Practitioner-Gap?", "a": "Wissenschaftliche Erkenntnisse (z. B. hohe Validität von Intelligenztests) sind in der Personalpraxis noch nicht angekommen; Akzeptanz/Machbarkeit entscheiden mit.", "c": "6 Personalpsychologie"}];
let pool=[], idx=0, known=new Set();
const $=id=>document.getElementById(id);
const cats=[...new Set(ALL.map(c=>c.c))].sort();
const sel=$("cat"); sel.innerHTML='<option value="__all">Alle Kategorien ('+ALL.length+')</option>'+
  cats.map(c=>`<option value="${c}">${c}</option>`).join("");

function build(){
  const v=sel.value;
  pool=ALL.map((c,i)=>({...c,i})).filter(c=>v==="__all"||c.c===v);
  idx=0; known.clear(); render();
}
function render(){
  if(!pool.length)return;
  const c=pool[idx];
  $("card").classList.remove("flip");
  setTimeout(()=>{ $("q").textContent=c.q; $("a").textContent=c.a;
    $("tagF").textContent=c.c; },120);
  $("counter").textContent=(idx+1)+" / "+pool.length;
  $("fill").style.width=(known.size/pool.length*100)+"%";
  $("doneMsg").textContent = known.size===pool.length ? "🎉 Alle Karten dieser Auswahl gewusst!" : "";
}
$("card").onclick=()=>$("card").classList.toggle("flip");
$("next").onclick=()=>{idx=(idx+1)%pool.length;render();};
$("prev").onclick=()=>{idx=(idx-1+pool.length)%pool.length;render();};
$("know").onclick=()=>{known.add(pool[idx].i); if(idx<pool.length-1)idx++; render();};
$("shuffle").onclick=()=>{for(let i=pool.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[pool[i],pool[j]]=[pool[j],pool[i]];}idx=0;render();};
$("reset").onclick=build; sel.onchange=build;
document.addEventListener("keydown",e=>{
  if(e.code==="Space"){e.preventDefault();$("card").classList.toggle("flip");}
  else if(e.code==="ArrowRight")$("next").click();
  else if(e.code==="ArrowLeft")$("prev").click();});
build();
</script></body></html>
