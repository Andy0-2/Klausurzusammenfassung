nalpsychologie"}, {"q": "Arbeitsproben und Assessment Center zählen im trimodalen Ansatz zum …", "o": ["Eigenschafts-/Konstruktansatz", "Simulationsansatz", "biografischen Ansatz", "graphologischen Ansatz"], "c": 1, "lvl": "mittel", "e": "Simulationsansatz (Inhaltsvalidierung): Arbeitsproben, AC.", "k": "6 Personalpsychologie"}, {"q": "Das „Multi-Prinzip“ des Assessment Centers meint mehrere …", "o": ["Standorte, Tage, Sprachen, Tests", "Teilnehmer, Beobachter, Verfahren, Anforderungen", "Fragebögen, Skalen, Normen, Cut-offs", "Interviewer, Referenzen, Zeugnisse, Proben"], "c": 1, "lvl": "schwer", "e": "Mehrere Teilnehmer, Beobachter, Verfahren, Anforderungen.", "k": "6 Personalpsychologie"}, {"q": "Wenn ein guter Gesamteindruck einzelne Bewertungen „überstrahlt“, liegt vor: der …", "o": ["Milde-Effekt", "Halo-Effekt", "Primacy-Effekt", "Kontrasteffekt"], "c": 1, "lvl": "mittel", "e": "Halo-Effekt: Gesamteindruck färbt auf Einzelurteile ab.", "k": "6 Personalpsychologie"}, {"q": "Welche Intelligenzform ist angeboren, lernunabhängig und nimmt im Alter ab?", "o": ["kristalline Intelligenz", "fluide Intelligenz", "verbale Intelligenz", "emotionale Intelligenz"], "c": 1, "lvl": "mittel", "e": "Cattell: fluide (gf) angeboren, sinkt; kristalline (gc) kumuliert, steigt.", "k": "6 Personalpsychologie"}, {"q": "Welches Verfahren hat die GERINGSTE prädiktive Validität?", "o": ["Allgemeine Intelligenz (GMA)", "Strukturiertes Interview", "Arbeitsprobe", "Graphologisches Gutachten"], "c": 3, "lvl": "leicht", "e": "Graphologie ist nahezu wertlos; GMA/struktur. Interview am besten.", "k": "6 Personalpsychologie"}];
const LETTER=["A","B","C","D"];
const badge={leicht:["b-l","leicht"],mittel:["b-m","mittel"],schwer:["b-s","schwer"]};
let pool=[], answers={}, submitted=false;
const $=s=>document.querySelector(s);
const kaps=[...new Set(DATA.map(d=>d.k))];
$("#filter").innerHTML='<option value="all">Alle Kapitel ('+DATA.length+')</option>'+
  kaps.map(k=>`<option value="${k}">${k}</option>`).join("");

function init(list){
  pool=list.map((d,i)=>({...d,_id:DATA.indexOf(d)}));
  answers={}; submitted=false; $("#result").className="result";
  render(); updateProgress();
}
function render(){
  const q=$("#quiz"); q.innerHTML="";
  pool.forEach((d,i)=>{
    const card=document.createElement("div"); card.className="card";
    const [bc,bt]=badge[d.lvl];
    let html=`<div class="kap">${d.k}</div><div class="qn">${i+1}. ${d.q}<span class="badge ${bc}">${bt}</span></div>`;
    d.o.forEach((o,j)=>{
      html+=`<label class="opt" data-q="${i}" data-o="${j}"><input type="radio" name="q${i}" ${answers[i]===j?"checked":""}>${LETTER[j]}) ${o}</label>`;
    });
    html+=`<div class="expl" id="e${i}"><b>Richtig: ${LETTER[d.c]}.</b> ${d.e}</div>`;
    card.innerHTML=html; q.appendChild(card);
  });
  document.querySelectorAll(".opt").forEach(el=>{
    el.onclick=()=>{ if(submitted)return;
      const qi=+el.dataset.q, oi=+el.dataset.o; answers[qi]=oi;
      el.parentNode.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));
      el.classList.add("sel"); el.querySelector("input").checked=true; updateProgress();
    };
  });
}
function updateProgress(){
  $("#ptop").textContent=`Beantwortet: ${Object.keys(answers).length} / ${pool.length}`;
}
function grade(){
  submitted=true; let correct=0;
  pool.forEach((d,i)=>{
    $("#e"+i).classList.add("show");
    document.querySelectorAll(`.opt[data-q="${i}"]`).forEach(el=>{
      const oi=+el.dataset.o; el.style.cursor="default";
      if(oi===d.c) el.classList.add("correct");
      else if(answers[i]===oi) el.classList.add("wrong");
    });
    if(answers[i]===d.c) correct++;
  });
  const n=pool.length, pct=Math.round(correct/n*100), pass=correct>=Math.ceil(n/2);
  let grade = pct>=90?"Note ≈ 1 (exzellent)":pct>=75?"Note ≈ 2 (gut)":pct>=60?"Note ≈ 3 (befriedigend)":pass?"Note ≈ 4 (bestanden)":"nicht bestanden";
  const r=$("#result"); r.className="result show";
  r.innerHTML=`<div class="score">${correct} / ${n} <span style="font-size:1.1rem">(${pct}%)</span></div>
    <div class="bar"><div class="fill" style="width:${pct}%;background:${pass?'#1f9d55':'#d6453d'}"></div></div>
    <div class="grade ${pass?'pass':'fail'}">${pass?'✓ BESTANDEN':'✗ NICHT BESTANDEN'} · ${grade}</div>`;
  window.scrollTo({top:0,behavior:"smooth"});
}
$("#submit").onclick=()=>{ if(submitted){init(pool);} else grade(); };
$("#submit").textContent="✓ Auswerten";
$("#filter").onchange=e=>{const v=e.target.value; init(v==="all"?DATA:DATA.filter(d=>d.k===v));};
$("#shuffle").onclick=()=>{const a=[...pool];for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}init(a);};
$("#restart").onclick=()=>{const v=$("#filter").value;init(v==="all"?DATA:DATA.filter(d=>d.k===v));};
init(DATA);
</script></body></html>
